<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feliz Dia das Mulheres</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
overflow:hidden;
font-family: Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background: linear-gradient(135deg,#ff9ecb,#ffc1e3,#ffd6f0);
}

.mensagem{
position:relative;
z-index:2;
background:rgba(255,255,255,0.9);
padding:40px;
border-radius:25px;
max-width:650px;
font-size:24px;
color:#d81b60;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.botao{
margin-top:25px;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4d88;
color:white;
cursor:pointer;
transition:0.3s;
}

.botao:hover{
transform:scale(1.1);
background:#ff2e73;
}

.heart{
position:absolute;
top:-50px;
animation:cair linear forwards;
}

@keyframes cair{
0%{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

.explode{
position:absolute;
font-size:30px;
animation:explodir 1s forwards;
}

@keyframes explodir{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:translateY(-200px) scale(2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="mensagem">

💖 Feliz dia das mulheres meu amor 💖 <br><br>

Quero que saiba que você é muito especial para mim,  
você é uma mulher incrível, muito guerreira.  
Vou sempre fazer de tudo por você.

<br><br>

Eu te amo ❤️

<br>

<button class="botao" onclick="explodirCoracoes()">
Eu te amo 💕
</button>

</div>

<!-- Música automática -->
<iframe 
width="0" 
height="0"
src="https://www.youtube.com/embed/fK0sJ7X9Y8A?autoplay=1&start=0&end=105"
frameborder="0"
allow="autoplay">
</iframe>

<script>

function criarCoracao(){
const heart = document.createElement("div");
heart.className = "heart";
heart.innerHTML = "❤️";

heart.style.left = Math.random() * 100 + "vw";
heart.style.fontSize = (20 + Math.random()*40) + "px";
heart.style.animationDuration = (4 + Math.random()*4) + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);
}

setInterval(criarCoracao,150);

function explodirCoracoes(){

for(let i=0;i<20;i++){

const heart = document.createElement("div");
heart.className = "explode";
heart.innerHTML = "💖";

heart.style.left = (window.innerWidth/2) + "px";
heart.style.top = (window.innerHeight/2) + "px";

heart.style.transform += ` translate(${Math.random()*400-200}px, ${Math.random()*400-200}px)`;

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);
}

}

</script>

</body>
</html>
